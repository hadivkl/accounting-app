name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'  # تغییر از 22 به 20 برای پایداری بیشتر
    
    - name: Install dependencies
      run: npm ci
      
    - name: Build web app
      run: npm run build
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'  # تغییر از 21 به 17 (نسخه پایدارتر برای اندروید)
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Install Capacitor and Dependencies
      run: |
        npm install @capacitor/cli @capacitor/android
        npm install @capacitor/local-notifications  # اضافه کردن نوتیفیکیشن
        
    - name: Initialize Capacitor
      run: |
        rm -rf android
        npx cap init "Simorgh Ledger" "ir.simorgh.ledger" --web-dir=dist  # تغییر نام به یکسان با capacitor.config.json
        npx cap add android
        
    - name: Sync Capacitor
      run: npx cap sync android
        
    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon  # اضافه کردن --no-daemon برای جلوگیری از خطا
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
